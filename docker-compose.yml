version: '3.8'

services:
  transfermarkt-analytics:
    build: .
    container_name: transfermarkt-analytics
    ports:
      - "8501:8501"
    volumes:
      - ./transfermarkt.db:/app/transfermarkt.db
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./transfermarkt.db
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
